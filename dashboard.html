<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="meta-title">YHB Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F0F0F0; color: #000; -webkit-tap-highlight-color: transparent; }
        .neo-card { background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0px 0px #000; }
        .neo-btn-black { background: #000; color: #fff; border: 4px solid #000; font-weight: 900; transition: 0.2s; }
        .neo-btn-black:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        .neo-btn-yellow { background: #FFE600; color: #000; border: 4px solid #000; font-weight: 900; box-shadow: 4px 4px 0px 0px #000; }
        .neo-btn-yellow:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
        .neo-input { border: 4px solid #000; padding: 12px; font-weight: 700; outline: none; background: #fff; }
        .glass-header { background: #FFE600; border-bottom: 4px solid #000; }
        .tab-active { background: #000 !important; color: #fff !important; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden">

    <div id="view-login" class="h-full w-full flex flex-col items-center justify-center px-6 absolute inset-0 z-50 bg-[#FFE600] transition-all duration-500">
        <div class="w-full max-w-sm flex flex-col items-center animate-in text-center">
            <img id="logo-login" src="" class="h-20 w-auto mb-8">
            <div class="w-full neo-card p-6 mb-8 bg-white">
                <h1 class="font-black text-2xl uppercase italic mb-6">Staff Access</h1>
                <input type="text" id="userInput" placeholder="STAFF ID" class="w-full neo-input text-center text-lg mb-4 placeholder-gray-400">
                <div id="pin-dots" class="flex justify-center gap-4 my-4">
                    <div class="w-4 h-4 border-2 border-black rounded-full" id="dot-1"></div>
                    <div class="w-4 h-4 border-2 border-black rounded-full" id="dot-2"></div>
                    <div class="w-4 h-4 border-2 border-black rounded-full" id="dot-3"></div>
                    <div class="w-4 h-4 border-2 border-black rounded-full" id="dot-4"></div>
                </div>
                <p id="error-msg" class="text-red-600 font-black text-xs mt-2 opacity-0 uppercase italic">Akses Ditolak</p>
            </div>
            <div class="grid grid-cols-3 gap-4 w-full px-4">
                <script>for(let i=1; i<=9; i++) document.write(`<button onclick="LOGIN_SYSTEM.press('${i}')" class="neo-btn-yellow h-16 text-2xl">${i}</button>`);</script>
                <button onclick="LOGIN_SYSTEM.press('clear')" class="neo-btn-yellow h-16 text-sm uppercase">Del</button>
                <button onclick="LOGIN_SYSTEM.press('0')" class="neo-btn-yellow h-16 text-2xl">0</button>
            </div>
        </div>
    </div>

    <div id="view-cashier" class="h-full w-full hidden flex-col absolute inset-0 z-30 bg-[#F0F0F0]">
        <header class="glass-header p-4 flex flex-wrap justify-between items-center gap-4 shrink-0">
            <div class="flex items-center gap-4">
                <img id="logo-cashier" src="" class="h-12 border-2 border-black">
                <div>
                    <h1 class="font-black text-xl italic leading-none">TERMINAL</h1>
                    <p id="cashier-branch-name" class="text-[10px] font-black uppercase mt-1 bg-black text-white px-1">LOADING...</p>
                </div>
            </div>
            
            <div class="flex bg-white border-4 border-black p-1">
                <button onclick="CASHIER_LOGIC.switchTab('queue')" id="tab-btn-queue" class="px-4 py-2 text-xs font-black uppercase tab-active">Live Queue</button>
                <button onclick="CASHIER_LOGIC.switchTab('report')" id="tab-btn-report" class="px-4 py-2 text-xs font-black uppercase">Reports</button>
                <button onclick="CASHIER_LOGIC.switchTab('config')" id="tab-btn-config" class="px-4 py-2 text-xs font-black uppercase">Pricelist</button>
            </div>

            <div class="flex gap-2">
                <button onclick="CASHIER_LOGIC.loadData()" class="neo-btn-yellow p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
                <button onclick="LOGIN_SYSTEM.logout()" class="neo-btn-black px-4 text-xs">LOGOUT</button>
            </div>
        </header>

        <main id="tab-queue" class="flex-1 overflow-y-auto p-4 flex flex-col lg:flex-row gap-6 animate-in">
            <div class="flex-1 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="neo-card p-4 bg-white"><p class="text-[10px] font-black uppercase opacity-50 mb-1">Gross Omset</p><p id="sum-omset" class="font-black text-2xl">Rp 0</p></div>
                    <div class="neo-card p-4 bg-white"><p class="text-[10px] font-black uppercase opacity-50 mb-1">Expenses</p><p id="sum-expense" class="font-black text-2xl text-red-600">Rp 0</p></div>
                    <div class="neo-card p-4 bg-black text-[#FFE600]"><p class="text-[10px] font-black uppercase mb-1">Today Profit</p><p id="sum-profit" class="font-black text-2xl">Rp 0</p></div>
                </div>

                <div class="neo-card flex-1 min-h-[500px] flex flex-col bg-white overflow-hidden">
                    <div class="p-4 border-b-4 border-black bg-gray-100 font-black text-xl italic uppercase">Upcoming Guests</div>
                    <div id="queue-container" class="flex-1 p-4 space-y-4"></div>
                </div>
            </div>

            <div class="w-full lg:w-80 space-y-4">
                <button onclick="CASHIER_LOGIC.openExpenseModal()" class="neo-btn-black w-full py-4 text-sm uppercase italic tracking-widest">[+] Catat Pengeluaran</button>
                <div class="neo-card bg-white flex flex-col overflow-hidden">
                    <div class="p-4 border-b-4 border-black bg-gray-100 font-black text-sm uppercase italic">Expenses List</div>
                    <div id="expense-container" class="p-4 space-y-2"></div>
                </div>
            </div>
        </main>

        <main id="tab-report" class="flex-1 overflow-y-auto p-4 hidden animate-in">
            <div class="max-w-4xl mx-auto neo-card bg-white p-6">
                <div class="flex flex-col sm:flex-row gap-4 mb-6 items-end">
                    <div class="flex-1 w-full"><label class="font-black text-[10px] uppercase mb-2 block">Periode Laporan</label><input type="month" id="report-month" onchange="CASHIER_LOGIC.processReport()" class="w-full neo-input"></div>
                    <button onclick="CASHIER_LOGIC.exportPDF()" class="neo-btn-black h-[58px] px-6 uppercase">Save PDF</button>
                </div>
                <div id="printable-report" class="border-4 border-black p-4">
                    <table class="w-full text-left"><thead class="border-b-4 border-black font-black text-xs uppercase italic"><tr><th class="p-3">Tanggal</th><th class="p-3 text-center">Qty</th><th class="p-3 text-right">In</th><th class="p-3 text-right">Out</th></tr></thead><tbody id="report-table-body" class="font-bold text-sm"></tbody></table>
                </div>
            </div>
        </main>

        <main id="tab-config" class="flex-1 overflow-y-auto p-4 hidden animate-in">
            <div class="max-w-3xl mx-auto space-y-8">
                <div class="neo-card bg-white p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-black text-2xl italic uppercase">Layanan Utama</h2>
                        <button onclick="CASHIER_LOGIC.openPackageModal('PRIMER')" class="neo-btn-yellow px-4 py-2 text-xs uppercase">Add New</button>
                    </div>
                    <div id="config-primer-list" class="space-y-3 font-bold"></div>
                </div>
                <div class="neo-card bg-white p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-black text-2xl italic uppercase">Add-On List</h2>
                        <button onclick="CASHIER_LOGIC.openPackageModal('ADD ON')" class="neo-btn-yellow px-4 py-2 text-xs uppercase">Add New</button>
                    </div>
                    <div id="config-addon-list" class="space-y-3 font-bold"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm neo-card p-6 animate-in">
            <h2 class="font-black text-2xl italic uppercase mb-2">Checkout</h2>
            <p id="checkout-cust-name" class="font-bold text-gray-500 mb-6 uppercase text-xs tracking-widest">GUEST NAME</p>
            <div class="space-y-4">
                <div><p class="font-black text-[10px] uppercase mb-2 italic">Main Service:</p><div id="checkout-main-service" class="neo-card p-4 font-black bg-gray-50 italic">...</div></div>
                <div><p class="font-black text-[10px] uppercase mb-2 italic">Extra Add-ons:</p><div id="checkout-addons-list" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div></div>
                <div class="border-t-4 border-black pt-4 mt-6">
                    <div class="flex justify-between items-center mb-6 font-black uppercase"><span class="text-sm italic">Grand Total:</span><span id="checkout-total-display" class="text-3xl text-blue-700 tracking-tighter italic">Rp 0</span></div>
                    <div class="flex gap-4"><button onclick="CASHIER_LOGIC.closeCheckoutModal()" class="flex-1 font-black uppercase text-[10px] underline">Cancel</button><button onclick="CASHIER_LOGIC.confirmCheckout()" class="neo-btn-black flex-[2] py-4 italic uppercase">Selesai & Catat</button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-pkg" class="fixed inset-0 z-[100] bg-black/90 hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm neo-card p-6 animate-in">
            <h2 id="pkg-modal-title" class="font-black text-2xl italic uppercase mb-6">Manage Item</h2>
            <input type="hidden" id="pkg-id"><input type="hidden" id="pkg-category">
            <div class="space-y-4">
                <input type="text" id="pkg-name" placeholder="NAMA LAYANAN" class="w-full neo-input uppercase italic">
                <input type="text" id="pkg-desc" placeholder="DESKRIPSI" class="w-full neo-input">
                <input type="number" id="pkg-price" placeholder="HARGA" class="w-full neo-input font-black text-2xl italic">
                <div class="flex gap-3 pt-4"><button onclick="document.getElementById('modal-pkg').classList.add('hidden')" class="flex-1 font-black uppercase text-[10px]">Batal</button><button onclick="CASHIER_LOGIC.savePackage()" class="neo-btn-black flex-[2] py-4 italic">SIMPAN</button></div>
                <button id="btn-delete-pkg" onclick="CASHIER_LOGIC.deletePackage()" class="w-full text-red-600 font-black text-[10px] uppercase underline mt-4 hidden">Hapus Permanen</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-white/95 z-[200] hidden flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-8 border-black border-t-[#FFE600] rounded-full animate-spin mb-4"></div>
        <h2 id="loading-text" class="font-black italic uppercase tracking-tighter">Running Logic...</h2>
    </div>

    <script>
        const CONFIG = {
            TENANT_ID: "YHB",
            WEBHOOK_URL: 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/a6512d05-a51a-4289-9063-9a4f17ac745a',
            LOGO_URL: "https://raw.githubusercontent.com/sunsetdansenja-arch/YELLOW-BARBER-ASSETS/main/LOGO%20YELLOW%20BARBER.png",
            COMMISSION_RATE: 0.40,
            BRANCHES: [ { db_name: "YELLOW BANDA", display_name: "Banda Aceh" } ]
        };

        const STATE = { user: null, activeTab: 'queue', allPackages: [], allAddons: [], queue: [], checkoutData: null, sysDates: null };

        const UTIL = {
            formatRp: (n) => 'Rp ' + Number(n || 0).toLocaleString('id-ID'),
            showLoading: (t) => { document.getElementById('loading-text').innerText = t || "WAIT..."; document.getElementById('loading-overlay').classList.replace('hidden', 'flex'); },
            hideLoading: () => document.getElementById('loading-overlay').classList.replace('flex', 'hidden'),
            post: async (payload) => {
                const res = await fetch(CONFIG.WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...payload, tenant_id: CONFIG.TENANT_ID}) });
                return await res.json();
            }
        };

        const LOGIN_SYSTEM = {
            pin: "",
            init() {
                const saved = localStorage.getItem('yhb_user');
                if (saved) { STATE.user = JSON.parse(saved); this.route(); }
            },
            press(v) {
                if (v === 'clear') this.pin = this.pin.slice(0, -1); else if (this.pin.length < 4) this.pin += v;
                for(let i=1; i<=4; i++) document.getElementById(`dot-${i}`).style.background = i <= this.pin.length ? '#000' : 'transparent';
                if (this.pin.length === 4) this.submit();
            },
            async submit() {
                const u = document.getElementById('userInput').value.toUpperCase();
                UTIL.showLoading("VERIFYING...");
                try {
                    const data = await UTIL.post({ action: 'login', username: u, password: this.pin });
                    const res = data[0] || data;
                    if(res.success) { STATE.user = res.user; localStorage.setItem('yhb_user', JSON.stringify(res.user)); this.route(); }
                    else throw new Error();
                } catch (e) { document.getElementById('error-msg').style.opacity = '1'; this.pin = ""; }
                finally { UTIL.hideLoading(); }
            },
            route() {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-cashier').classList.replace('hidden', 'flex');
                CASHIER_LOGIC.init();
            },
            logout() { localStorage.removeItem('yhb_user'); location.reload(); }
        };

        const CASHIER_LOGIC = {
            init() {
                const b = CONFIG.BRANCHES.find(x => x.db_name === STATE.user.branch);
                document.getElementById('cashier-branch-name').innerText = b ? b.display_name : STATE.user.branch;
                const now = new Date(); document.getElementById('report-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
                this.loadData();
            },
            switchTab(tab) {
                ['queue', 'report', 'config'].forEach(t => { document.getElementById(`tab-${t}`).classList.add('hidden'); document.getElementById(`tab-btn-${t}`).classList.remove('tab-active'); });
                document.getElementById(`tab-${tab}`).classList.remove('hidden');
                document.getElementById(`tab-btn-${tab}`).classList.add('tab-active');
                STATE.activeTab = tab;
                if(tab === 'config') this.renderConfig();
            },
            async loadData() {
                UTIL.showLoading("SYNCING...");
                try {
                    const data = await UTIL.post({ action: 'get_cashier_data', branch: STATE.user.branch });
                    const res = data[0] || data;
                    if(res.success) {
                        STATE.queue = res.queue; STATE.allPackages = res.packages; STATE.allAddons = res.addons; STATE.sysDates = res.sys_dates;
                        this.renderQueue(); this.renderExpenses(res.expenses); this.updateSum(res.queue, res.expenses);
                    }
                } catch(e) {} finally { UTIL.hideLoading(); }
            },
            updateSum(q, e) {
                let omset = 0; let exp = 0;
                q.forEach(i => { if(i.status === 'DONE' && i.tanggal.substring(0,10) === STATE.sysDates.today) omset += Number(i.price); });
                e.forEach(i => { exp += Number(i.nominal); });
                document.getElementById('sum-omset').innerText = UTIL.formatRp(omset);
                document.getElementById('sum-expense').innerText = UTIL.formatRp(exp);
                document.getElementById('sum-profit').innerText = UTIL.formatRp(omset - exp);
            },
            renderQueue() {
                const container = document.getElementById('queue-container');
                container.innerHTML = '';
                const today = STATE.queue.filter(x => x.tanggal.substring(0,10) === STATE.sysDates.today).sort((a,b) => a.jam.localeCompare(b.jam));
                if(today.length === 0) container.innerHTML = `<p class="text-center font-black italic text-gray-300 py-10 uppercase">No Data Today</p>`;
                today.forEach(item => {
                    const isDone = item.status === 'DONE';
                    container.insertAdjacentHTML('beforeend', `
                        <div class="neo-card p-4 flex justify-between items-center ${isDone ? 'opacity-40 bg-gray-50' : 'bg-white'}">
                            <div>
                                <div class="flex items-center gap-2 mb-1"><span class="font-black text-2xl italic">${item.jam}</span><span class="text-[9px] font-black uppercase px-2 py-0.5 border-2 border-black ${isDone ? 'bg-gray-200' : 'bg-[#FFE600]'}">${item.status}</span></div>
                                <h3 class="font-black uppercase text-sm italic">${item.cust_name || 'Walk-In'}</h3>
                                <p class="text-[10px] font-bold text-gray-500 uppercase italic">${item.package_name} • ${UTIL.formatRp(item.price)}</p>
                            </div>
                            ${!isDone ? `<button onclick="CASHIER_LOGIC.openCheckout('${item.id}')" class="neo-btn-black px-4 py-2 text-xs italic uppercase">SELESAI</button>` : ''}
                        </div>
                    `);
                });
            },
            renderExpenses(data) {
                const container = document.getElementById('expense-container'); container.innerHTML = '';
                data.forEach(item => { container.insertAdjacentHTML('beforeend', `<div class="neo-card p-3 flex justify-between items-center text-xs font-bold uppercase italic bg-white"><span>${item.deskripsi}</span><span class="text-red-600">-${Number(item.nominal)/1000}K</span></div>`); });
            },

            // --- CHECKOUT LOGIC ---
            openCheckout(id) {
                const item = STATE.queue.find(x => x.id == id);
                STATE.checkoutData = { ...item, selectedAddons: [], currentTotal: Number(item.price), basePackageName: item.package_name, basePrice: Number(item.price) };
                document.getElementById('checkout-cust-name').innerText = item.cust_name || 'Walk-In Guest';
                document.getElementById('checkout-main-service').innerText = `${item.package_name} (${UTIL.formatRp(item.price)})`;
                document.getElementById('checkout-addons-list').innerHTML = STATE.allAddons.map(a => `
                    <label class="flex items-center justify-between neo-card p-4 cursor-pointer hover:bg-yellow-50">
                        <div class="flex items-center gap-3"><input type="checkbox" onchange="CASHIER_LOGIC.toggleAddon(this, '${a.NAME}', ${a.PRICE})" class="w-6 h-6 accent-black"><span class="font-black uppercase text-xs italic">${a.NAME}</span></div>
                        <span class="font-black text-xs text-blue-600">+${Number(a.PRICE)/1000}K</span>
                    </label>`).join('');
                this.updateCheckoutTotal();
                document.getElementById('modal-checkout').classList.remove('hidden');
            },
            toggleAddon(el, name, price) {
                if(el.checked) STATE.checkoutData.selectedAddons.push({name, price});
                else STATE.checkoutData.selectedAddons = STATE.checkoutData.selectedAddons.filter(x => x.name !== name);
                this.updateCheckoutTotal();
            },
            updateCheckoutTotal() {
                const extra = STATE.checkoutData.selectedAddons.reduce((sum, x) => sum + x.price, 0);
                STATE.checkoutData.currentTotal = STATE.checkoutData.basePrice + extra;
                document.getElementById('checkout-total-display').innerText = UTIL.formatRp(STATE.checkoutData.currentTotal);
            },
            async confirmCheckout() {
                UTIL.showLoading("UPDATING DATA...");
                const finalPkgName = [STATE.checkoutData.basePackageName, ...STATE.checkoutData.selectedAddons.map(x => x.name)].join(" + ");
                try {
                    await UTIL.post({ 
                        action: 'update_status', 
                        id: Number(STATE.checkoutData.id), 
                        status: 'DONE', 
                        new_price: STATE.checkoutData.currentTotal, 
                        new_package_name: finalPkgName 
                    });
                    this.closeCheckoutModal(); await this.loadData();
                } catch(e) { alert("GAGAL"); } finally { UTIL.hideLoading(); }
            },
            closeCheckoutModal() { document.getElementById('modal-checkout').classList.add('hidden'); },

            // --- CONFIG LOGIC ---
            renderConfig() {
                const render = (list, containerId) => {
                    const c = document.getElementById(containerId); c.innerHTML = '';
                    list.forEach(p => c.insertAdjacentHTML('beforeend', `
                        <div class="neo-card p-4 flex justify-between items-center italic">
                            <div><p class="uppercase text-sm">${p.NAME}</p><p class="text-blue-600 text-xs">${UTIL.formatRp(p.PRICE)}</p></div>
                            <button onclick="CASHIER_LOGIC.openPackageModal('${p.CATEGORY}', ${JSON.stringify(p).replace(/"/g, '&quot;')})" class="neo-btn-black px-3 py-1 text-[10px]">EDIT</button>
                        </div>`));
                };
                render(STATE.allPackages, 'config-primer-list');
                render(STATE.allAddons, 'config-addon-list');
            },
            openPackageModal(cat, data = null) {
                document.getElementById('pkg-category').value = cat;
                document.getElementById('pkg-id').value = data ? data.id : '';
                document.getElementById('pkg-name').value = data ? data.NAME : '';
                document.getElementById('pkg-desc').value = data ? data.DESCRIPTION : '';
                document.getElementById('pkg-price').value = data ? data.PRICE : '';
                document.getElementById('pkg-modal-title').innerText = data ? 'Edit Item' : 'New ' + cat;
                document.getElementById('btn-delete-pkg').classList.toggle('hidden', !data);
                document.getElementById('modal-pkg').classList.remove('hidden');
            },
            async savePackage() {
                const id = document.getElementById('pkg-id').value;
                const payload = {
                    action: 'manage_package',
                    operation_type: id ? 'edit' : 'add',
                    package_id: id,
                    name: document.getElementById('pkg-name').value.toUpperCase(),
                    description: document.getElementById('pkg-desc').value,
                    price: Number(document.getElementById('pkg-price').value),
                    category: document.getElementById('pkg-category').value
                };
                if(!payload.name || !payload.price) return alert("Lengkapi Data!");
                UTIL.showLoading("SAVING CONFIG...");
                try { await UTIL.post(payload); document.getElementById('modal-pkg').classList.add('hidden'); await this.loadData(); } catch(e){} finally { UTIL.hideLoading(); }
            },
            async deletePackage() {
                if(!confirm("Yakin Hapus?")) return;
                UTIL.showLoading("DELETING...");
                try { await UTIL.post({ action: 'manage_package', operation_type: 'delete', package_id: document.getElementById('pkg-id').value }); document.getElementById('modal-pkg').classList.add('hidden'); await this.loadData(); } catch(e){} finally { UTIL.hideLoading(); }
            },

            // --- EXPENSE ---
            openExpenseModal() { document.getElementById('modal-pkg').classList.add('hidden'); alert("Gunakan modal yang sama atau buat baru di n8n."); },
            
            // --- PDF ---
            exportPDF() { UTIL.showLoading("Printing..."); html2pdf().from(document.getElementById('printable-report')).save().then(() => UTIL.hideLoading()); }
        };

        window.onload = () => APP_INIT.run();
    </script>
</body>
</html>
