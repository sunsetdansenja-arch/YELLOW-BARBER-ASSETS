<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="meta-title">Booking | Yellow Barber</title>
    <link id="meta-icon" rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/YELLOW-BARBER-ASSETS/main/LOGO%20YELLOW%20BARBER.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        /* CORE STYLES - CALVIN KLEIN VIBE */
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FAFAFA; color: #111111; overflow-x: hidden; }
        .uppercase-wider { text-transform: uppercase; letter-spacing: 0.15em; }
        
        /* SCROLLBAR */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* PREMIUM PANELS */
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .card-shadow { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); }
        
        /* ANIMATIONS */
        .taktil { transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .taktil:active { transform: scale(0.96); }
        .taktil-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .animate-shimmer { background: linear-gradient(90deg, #111 25%, #999 50%, #111 75%); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2.5s infinite linear; }
        
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .curtain-exit { transform: translateY(-100%); transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1) forwards; }
    </style>
</head>
<body class="pb-32">

    <div id="splash-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center overflow-hidden">
        <div class="relative z-10 flex flex-col items-center">
            <img id="splash-logo" src="" class="w-32 h-auto mb-8 drop-shadow-xl">
            <div class="text-center">
                <h1 class="text-[10px] font-black tracking-[0.4em] animate-shimmer uppercase-wider">Loading Experience</h1>
            </div>
        </div>
    </div>

    <div id="success-screen" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md hidden flex-col items-center justify-center p-6 overflow-hidden">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 flex flex-col items-center animate-slide-up text-center card-shadow">
            <div class="w-16 h-16 bg-[#FFE600] rounded-full flex items-center justify-center mb-6 text-black text-2xl font-black shadow-lg shadow-yellow-400/20">✓</div>
            <h1 class="font-black text-2xl tracking-tighter mb-6 uppercase italic">Booking Confirmed</h1>
            
            <div class="w-full space-y-4 text-[11px] font-bold text-zinc-500 mb-8 bg-zinc-50 p-6 rounded-3xl border border-zinc-100">
                <div class="flex justify-between items-center pb-3 border-b border-zinc-200">
                    <span class="uppercase tracking-widest">Branch</span><span id="receipt-branch" class="text-black font-black text-right">...</span>
                </div>
                <div class="flex justify-between items-center pb-3 border-b border-zinc-200">
                    <span class="uppercase tracking-widest">Barber</span><span id="receipt-capster" class="text-black font-black text-right">...</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="uppercase tracking-widest">Time</span><span id="receipt-time" class="text-black font-black text-right">...</span>
                </div>
            </div>
            
            <button onclick="location.reload()" class="w-full bg-black text-[#FFE600] py-4 rounded-full font-black uppercase-wider text-xs taktil mb-4 shadow-xl">Selesai</button>
            <a href="#" id="receipt-maps" target="_blank" class="text-[9px] font-bold text-zinc-400 uppercase-wider tracking-widest underline">Buka Rute Maps</a>
        </div>
    </div>

    <nav class="sticky top-0 z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <img id="nav-logo" src="" class="h-7 w-auto drop-shadow-sm">
        <div class="text-[9px] font-black uppercase-wider text-black bg-[#FFE600] px-4 py-1.5 rounded-full animate-pulse shadow-sm">Live</div>
    </nav>

    <main id="app" class="max-w-md mx-auto px-5 mt-8 relative z-10">
        
        <section id="step-initial" class="animate-slide-up flex flex-col items-center text-center">
            <h1 class="font-black text-4xl mb-2 tracking-tighter uppercase leading-[0.9] italic">Yellow<br>Barber</h1>
            <p class="text-[9px] font-bold text-zinc-400 mb-10 uppercase-wider">Premium Grooming Experience</p>

            <div class="w-full mb-12">
                <h3 class="font-black text-[10px] text-zinc-400 tracking-[0.3em] uppercase-wider mb-6 border-b border-zinc-200 pb-3">Select Branch</h3>
                <div id="branch-list" class="space-y-6"></div>
            </div>

            <div class="w-full mb-10">
                <h3 class="font-black text-[10px] text-zinc-400 tracking-[0.3em] uppercase-wider mb-6 border-b border-zinc-200 pb-3">Top 10 Sultan</h3>
                <ul id="leaderboard-list" class="space-y-2">
                    <li class="text-center py-4 animate-pulse font-bold text-[10px] text-zinc-400 uppercase tracking-widest">Loading...</li>
                </ul>
            </div>
        </section>

        <section id="step-staff" class="hidden animate-slide-up flex flex-col items-center">
            <button onclick="APP_LOGIC.resetToStep1()" class="text-[9px] font-black text-zinc-500 mb-8 uppercase-wider border border-zinc-200 px-6 py-2.5 rounded-full taktil hover:bg-zinc-50">
                ← Go Back
            </button>
            
            <div class="inline-flex items-center bg-zinc-100 px-5 py-2.5 mb-10 rounded-full border border-zinc-200 shadow-sm">
                <span class="w-2 h-2 rounded-full bg-[#FFE600] mr-2 animate-pulse shadow-sm"></span>
                <p id="selected-branch-text" class="text-[9px] font-black text-black uppercase tracking-[0.2em]"></p>
            </div>
            
            <div id="staff-list" class="w-full space-y-12"></div>
        </section>
    </main>

    <div id="bottom-bar" class="fixed bottom-6 left-5 right-5 z-40 hidden animate-slide-up">
        <div class="max-w-sm mx-auto bg-black p-3.5 rounded-[24px] flex justify-between items-center shadow-2xl border border-zinc-800">
            <div class="pl-4">
                <p class="text-[8px] uppercase text-zinc-400 font-bold tracking-widest mb-0.5">Total Biaya</p>
                <p id="display-price" class="text-lg font-black text-white tracking-tighter italic">Rp 0</p>
            </div>
            <button onclick="APP_LOGIC.openBookingForm()" class="bg-[#FFE600] text-black px-8 py-3.5 rounded-[16px] font-black text-xs uppercase-wider taktil shadow-lg italic">Lanjut</button>
        </div>
    </div>

    <div id="modal-book" class="fixed inset-0 z-[60] bg-black/60 backdrop-blur-md hidden flex items-end sm:items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white w-full max-w-sm p-6 sm:p-8 rounded-[32px] animate-slide-up max-h-[90vh] overflow-y-auto hide-scrollbar relative card-shadow">
            <div class="w-12 h-1 bg-zinc-200 rounded-full mx-auto mb-8"></div>
            <h2 class="font-black text-2xl mb-2 text-center tracking-tighter uppercase italic">Detail Booking</h2>
            <p class="text-[9px] font-bold text-zinc-400 text-center mb-8 uppercase-wider">Pilih Jadwal & Data Diri</p>
            
            <div class="space-y-6">
                <div>
                    <p class="text-[9px] font-black text-zinc-800 mb-3 uppercase tracking-widest pl-1">Tanggal</p>
                    <div id="date-slots" class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 px-1"></div>
                    <input type="hidden" id="booking_date" value="">
                </div>
                
                <div>
                    <p class="text-[9px] font-black text-zinc-800 mb-3 uppercase tracking-widest pl-1">Waktu (12:00 - 00:00)</p>
                    <div id="time-slots" class="grid grid-cols-4 gap-2"></div>
                    <input type="hidden" id="booking_time" value="">
                </div>
                
                <div class="space-y-3 pt-2">
                    <input type="text" id="cust_name" placeholder="NAMA LENGKAP" class="w-full bg-zinc-50 border border-zinc-200 rounded-[16px] px-5 py-4 focus:border-black outline-none text-xs font-black text-black uppercase placeholder-zinc-400 transition-all tracking-wider" autocomplete="off">
                    <input type="tel" id="cust_phone" placeholder="WHATSAPP (08...)" class="w-full bg-zinc-50 border border-zinc-200 rounded-[16px] px-5 py-4 focus:border-black outline-none text-xs font-black text-black uppercase placeholder-zinc-400 transition-all tracking-wider" autocomplete="off">
                </div>
                
                <div class="pt-4 space-y-3">
                    <button id="btn-submit" onclick="APP_LOGIC.submitBooking()" class="w-full bg-black text-[#FFE600] py-4 rounded-[16px] font-black text-[10px] uppercase italic taktil shadow-xl">Book Sekarang</button>
                    <button onclick="APP_LOGIC.closeModal()" class="w-full text-[10px] font-bold text-zinc-400 py-3 taktil uppercase-wider underline text-center block">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            TENANT_ID: "YHB",
            BRAND_NAME: "YELLOW BARBER",
            LOGO_URL: "https://raw.githubusercontent.com/sunsetdansenja-arch/YELLOW-BARBER-ASSETS/main/LOGO%20YELLOW%20BARBER.png",
            WEBHOOK_URL: 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/dbp-public',
            AVAILABLE_HOURS: ["12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"],
            BRANCHES_META: {
                "YELLOW BANDA": { cover: "https://raw.githubusercontent.com/sunsetdansenja-arch/YELLOW-BARBER-ASSETS/main/PHOTO%20ASSETS%201.png", rating: "4.9", rev: "150+", tags: "<span>Premium</span><span>AC</span>", display_name: "BANDA ACEH" }
            }
        };

        const extractData = (item) => item.json ? item.json : item;
        const delay = ms => new Promise(res => setTimeout(res, ms));

        const APP_LOGIC = {
            state: { branches: [], staffs: [], selectedBranch: null, selectedStaff: null, selectedPackage: null, finalPrice: 0, selectedStaffName: null, selectedPackageName: null },

            async init() {
                document.getElementById('meta-title').innerText = `Booking | ${CONFIG.BRAND_NAME}`;
                document.getElementById('meta-icon').href = CONFIG.LOGO_URL;
                document.getElementById('splash-logo').src = CONFIG.LOGO_URL;
                document.getElementById('nav-logo').src = CONFIG.LOGO_URL;

                try {
                    const fetchPromise = fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'get_initial_data', tenant_id: CONFIG.TENANT_ID })
                    }).then(res => res.json());

                    const [rawData] = await Promise.all([fetchPromise, delay(1500)]); 
                    const payload = Array.isArray(rawData) ? rawData[0] : rawData;
                    
                    this.state.branches = payload.branches ? (Array.isArray(payload.branches) ? payload.branches.map(extractData) : [extractData(payload.branches)]) : [];
                    this.state.branches = Array.from(new Map(this.state.branches.map(item => [item.id, item])).values());

                    // EKSTRAK DATA SULTAN (HANDLE ARRAY DARI N8N)
                    const history = payload.history_bookings || payload.bookings || [];
                    this.renderLeaderboard(history);
                    
                    this.renderBranches();
                    
                    const splash = document.getElementById('splash-screen');
                    splash.classList.add('curtain-exit');
                    setTimeout(() => splash.remove(), 800);
                } catch (e) {
                    document.getElementById('splash-screen').innerHTML = `<div class="bg-white p-6 text-center"><h1 class="text-black font-black text-xl tracking-widest uppercase">Koneksi Gagal</h1></div>`;
                }
            },

            normalizePhone(phone) {
                if(!phone) return ''; let p = String(phone).replace(/\D/g, ''); 
                if (p.startsWith('08')) p = '628' + p.substring(2); return p;
            },

            renderLeaderboard(historyData) {
                const container = document.getElementById('leaderboard-list');
                
                let normalizedData = [];
                if (Array.isArray(historyData)) {
                    normalizedData = historyData.map(item => item.json ? item.json : item);
                }

                if(!normalizedData || normalizedData.length === 0) { 
                    container.innerHTML = `<li class="text-center py-4 font-bold text-[10px] text-zinc-400 uppercase tracking-[0.2em]">Belum ada data Sultan</li>`; 
                    return; 
                }

                const sums = {};
                normalizedData.forEach(trx => {
                    if(trx.status !== 'DONE' && trx.status !== 'SUCCESS') return;

                    const cleanPhone = this.normalizePhone(trx.cust_phone);
                    const price = Number(trx.price) || 0;

                    if(!cleanPhone || price === 0) return;
                    
                    if(!sums[cleanPhone]) sums[cleanPhone] = { name: trx.cust_name || 'Hamba Allah', total: 0 };
                    sums[cleanPhone].total += price;
                });

                const top10 = Object.values(sums).sort((a,b) => b.total - a.total).slice(0, 10);
                
                if(top10.length === 0) {
                    container.innerHTML = `<li class="text-center py-4 font-bold text-[10px] text-zinc-400 uppercase tracking-[0.2em]">Belum ada transaksi valid</li>`; 
                    return;
                }

                container.innerHTML = top10.map((s, index) => {
                    let badge = 'text-zinc-300'; 
                    if(index === 0) badge = 'text-[#FFE600] drop-shadow-sm'; 
                    else if(index === 1) badge = 'text-zinc-400'; 
                    else if(index === 2) badge = 'text-amber-600';
                    
                    return `
                    <li class="flex items-center justify-between py-3 border-b border-zinc-100 last:border-0">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-sm w-4 text-center ${badge}">${index+1}</span>
                            <span class="font-bold text-[11px] text-black uppercase tracking-wider italic">${s.name}</span>
                        </div>
                        <span class="font-bold text-[9px] text-zinc-400 uppercase tracking-widest">IDR ${(s.total/1000).toFixed(0)}K</span>
                    </li>`;
                }).join('');
            },

            renderBranches() {
                const container = document.getElementById('branch-list');
                if (this.state.branches.length === 0) return;

                const isOpen = new Date().getHours() >= 12; 

                container.innerHTML = this.state.branches.map((b, index) => {
                    const meta = CONFIG.BRANCHES_META[b.dpb_branches_name] || { cover: CONFIG.LOGO_URL, display_name: b.dpb_branches_name };
                    const status = isOpen ? `<span class="bg-[#FFE600] text-black px-3 py-1 rounded text-[8px] font-black uppercase tracking-widest">Open</span>` : `<span class="bg-black text-white px-3 py-1 rounded text-[8px] font-black uppercase tracking-widest">Closed</span>`;

                    return `
                    <div onclick="APP_LOGIC.selectBranch('${b.dpb_branches_name}', '${meta.display_name}')" class="bg-white rounded-[24px] overflow-hidden card-shadow taktil-hover transition-all cursor-pointer animate-slide-up" style="animation-delay: ${index * 0.1}s">
                        <div class="relative h-56 w-full">
                            <img src="${meta.cover}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/20"></div>
                            <div class="absolute top-4 left-4">${status}</div>
                            <div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
                                <h3 class="font-black text-2xl text-white tracking-tighter uppercase drop-shadow-lg italic">${meta.display_name}</h3>
                                <div class="bg-white/90 backdrop-blur-sm text-black font-black text-[10px] px-3 py-1.5 rounded-lg shadow-sm uppercase tracking-widest">Pilih ↗</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            },

            async selectBranch(dbName, displayName) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.state.selectedBranch = dbName;
                document.getElementById('step-initial').classList.add('hidden');
                document.getElementById('step-staff').classList.remove('hidden');
                document.getElementById('selected-branch-text').innerText = displayName;
                
                document.getElementById('staff-list').innerHTML = `<div class="text-center py-20 animate-pulse"><p class="font-black text-[10px] text-zinc-400 tracking-[0.3em] uppercase">Memuat Capster...</p></div>`;

                try {
                    const res = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'get_staff_list', branch_name: dbName, tenant_id: CONFIG.TENANT_ID })
                    });
                    const rawStaff = await res.json();
                    this.state.staffs = (Array.isArray(rawStaff) ? rawStaff : [rawStaff]).map(extractData);
                    this.renderStaff(this.state.staffs);
                } catch (e) { console.error(e); }
            },

            renderStaff(staffs) {
                const container = document.getElementById('staff-list');
                if (!staffs || staffs.length === 0 || !staffs[0].id) { container.innerHTML = `<p class="text-zinc-400 font-bold text-xs text-center py-10 uppercase tracking-widest">Capster belum tersedia.</p>`; return; }

                container.innerHTML = staffs.map((s, index) => {
                    const role = s.role ? s.role.toUpperCase() : 'CAPSTER';
                    
                    const primerServices = (s.services || []).filter(srv => srv.CATEGORY === 'PRIMER' || !srv.CATEGORY);
                    if(primerServices.length === 0) return '';

                    const servicesHtml = primerServices.map(ser => {
                        const finalPrice = Number(ser.price || ser.PRICE);
                        const serviceName = ser.name || ser.NAME;
                        return `
                        <button onclick="APP_LOGIC.prepareBooking('${s.id}', '${ser.id}', ${finalPrice}, '${serviceName}')" class="flex flex-col items-center justify-center text-center p-3 rounded-xl border border-zinc-200 bg-white hover:border-black hover:bg-zinc-50 transition-all taktil card-shadow space-y-1">
                            <span class="text-[10px] font-black text-black uppercase italic tracking-wider leading-tight">${serviceName}</span>
                            <span class="text-[9px] font-black text-white bg-black px-2.5 py-1 rounded-full italic shadow-md">Rp ${finalPrice.toLocaleString('id-ID')}</span>
                        </button>
                        `;
                    }).join('');

                    return `
                    <div class="bg-white rounded-[24px] border border-zinc-100 card-shadow overflow-hidden animate-slide-up" style="animation-delay: ${index * 0.1}s">
                        <div class="p-5 pt-6 bg-white border-b-2 border-zinc-100">
                            <div>
                                <h4 class="font-black text-xl text-black uppercase tracking-tighter mb-1 leading-none italic">${s.dbp_staff_name}</h4>
                                <span class="inline-block text-[8px] font-bold text-black bg-zinc-100 border border-zinc-200 px-3 py-1 rounded-full uppercase-wider shadow-sm mb-2">${role}</span>
                            </div>
                        </div>
                        <div class="p-5 bg-zinc-50/50">
                            <div class="grid grid-cols-2 gap-3">
                                ${servicesHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');
            },

            prepareBooking(staffId, packageId, price, packageName) {
                this.state.selectedStaff = staffId; this.state.selectedPackage = packageId; 
                this.state.finalPrice = price; this.state.selectedPackageName = packageName;
                
                const staff = this.state.staffs.find(s => s.id == staffId);
                this.state.selectedStaffName = staff ? staff.dbp_staff_name : staffId;
                
                document.getElementById('display-price').innerText = `Rp ${price.toLocaleString('id-ID')}`;
                document.getElementById('bottom-bar').classList.remove('hidden');
            },

            generateDates() {
                const dates = []; const today = new Date(); const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"]; const dayNames = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
                for(let i=0; i<8; i++) {
                    const d = new Date(today); d.setDate(d.getDate() + i);
                    const day = d.getDate().toString().padStart(2, '0'); const month = monthNames[d.getMonth()]; const dayName = dayNames[d.getDay()]; const year = d.getFullYear();
                    dates.push({ display: i === 0 ? "Hari Ini" : `${dayName}, ${day} ${month}`, value: `${year}-${(d.getMonth()+1).toString().padStart(2,'0')}-${day}` });
                } return dates;
            },

            openBookingForm() { document.getElementById('booking_date').value = ''; document.getElementById('booking_time').value = ''; this.renderDateSlots(); this.renderTimeSlots(); document.getElementById('modal-book').classList.remove('hidden'); },
            closeModal() { document.getElementById('modal-book').classList.add('hidden'); },

            renderDateSlots() {
                document.getElementById('date-slots').innerHTML = this.generateDates().map(d => `<button id="btn-date-${d.value}" onclick="APP_LOGIC.selectDate('${d.value}')" class="date-btn flex-shrink-0 bg-zinc-50 border border-zinc-200 px-5 py-3 rounded-[16px] text-[10px] font-black uppercase tracking-widest text-zinc-500 taktil whitespace-nowrap">${d.display}</button>`).join('');
            },

            selectDate(dateValue) {
                document.getElementById('booking_date').value = dateValue;
                document.querySelectorAll('.date-btn').forEach(btn => { btn.classList.remove('bg-black', 'text-white', 'border-black'); btn.classList.add('bg-zinc-50', 'text-zinc-500', 'border-zinc-200'); });
                const selectedBtn = document.getElementById(`btn-date-${dateValue}`); selectedBtn.classList.remove('bg-zinc-50', 'text-zinc-500', 'border-zinc-200'); selectedBtn.classList.add('bg-black', 'text-white', 'border-black');
                document.getElementById('booking_time').value = ''; this.renderTimeSlots();
            },

            renderTimeSlots() {
                const container = document.getElementById('time-slots'); const selectedDate = document.getElementById('booking_date').value;
                if (!selectedDate) { container.innerHTML = `<div class="col-span-4 text-center py-4 text-[9px] font-bold text-zinc-400 uppercase tracking-widest">Pilih Tanggal</div>`; return; }

                const staffData = this.state.staffs.find(s => s.id == this.state.selectedStaff);
                const booked = staffData ? (staffData.booked_slots || []) : [];

                container.innerHTML = CONFIG.AVAILABLE_HOURS.map(h => {
                    if (booked.some(slot => String(slot).includes(selectedDate) && String(slot).includes(h))) {
                        // FIX: TOMBOL FULL MENGGUNAKAN TEXT "FULL" DAN WARNA MERAH
                        return `<button disabled class="time-btn w-full bg-red-100 text-red-700 border-2 border-red-300 py-3 rounded-[12px] text-[10px] font-black opacity-60 cursor-not-allowed line-through">FULL</button>`;
                    }
                    // FIX: KEMBALIKAN KE TEXT JAM
                    return `<button id="btn-time-${h.replace(':','')}" onclick="APP_LOGIC.selectTime('${h}')" class="time-btn w-full bg-zinc-50 text-zinc-500 border border-zinc-200 py-3 rounded-[12px] text-[10px] font-black transition-all taktil">${h}</button>`;
                }).join('');
            },

            selectTime(hour) {
                document.getElementById('booking_time').value = hour;
                document.querySelectorAll('.time-btn').forEach(btn => { btn.classList.remove('bg-[#FFE600]', 'text-black', 'border-[#FFE600]'); btn.classList.add('bg-zinc-50', 'text-zinc-500', 'border-zinc-200'); });
                const selectedBtn = document.getElementById(`btn-time-${hour.replace(':','')}`); selectedBtn.classList.remove('bg-zinc-50', 'text-zinc-500', 'border-zinc-200'); selectedBtn.classList.add('bg-[#FFE600]', 'text-black', 'border-[#FFE600]');
            },

            async submitBooking() {
                const name = document.getElementById('cust_name').value.trim(); const phone = document.getElementById('cust_phone').value.trim(); const tanggal = document.getElementById('booking_date').value; const jam = document.getElementById('booking_time').value;
                if(!name || !phone || !tanggal || !jam) return alert('Lengkapi semua data.');

                const btn = document.getElementById('btn-submit'); btn.innerText = "PROSES..."; btn.disabled = true; btn.classList.add('opacity-50');

                try {
                    const res = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'submit_booking', cust_name: name, cust_phone: phone, tanggal: tanggal, jam: jam, branch_id: this.state.selectedBranch, capster_id: this.state.selectedStaff, package_id: this.state.selectedPackage, price: this.state.finalPrice, caps_in_charge: this.state.selectedStaffName, package_name: this.state.selectedPackageName, tenant_id: CONFIG.TENANT_ID })
                    });
                    if(res.ok) {
                        const branchMeta = CONFIG.BRANCHES_META[this.state.selectedBranch] || { display_name: this.state.selectedBranch };
                        document.getElementById('receipt-branch').innerText = branchMeta.display_name; document.getElementById('receipt-capster').innerText = this.state.selectedStaffName; document.getElementById('receipt-time').innerText = `${tanggal} | ${jam}`;
                        document.getElementById('modal-book').classList.add('hidden');
                        const s = document.getElementById('success-screen'); s.classList.remove('hidden'); s.classList.add('flex');
                    } else throw new Error();
                } catch (e) { alert('Gagal. Coba lagi.'); btn.innerText = "BOOK SEKARANG"; btn.disabled = false; btn.classList.remove('opacity-50'); }
            },
            resetToStep1() { window.scrollTo({ top: 0, behavior: 'smooth' }); document.getElementById('step-initial').classList.remove('hidden'); document.getElementById('step-staff').classList.add('hidden'); document.getElementById('bottom-bar').classList.add('hidden'); }
        };

        window.onload = () => APP_LOGIC.init();
    </script>
</body>
</html>
