<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="meta-title">Booking | Premium System</title>
    <link id="meta-icon" rel="icon" type="image/png" href="">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* APPLE UI/UX CORE STYLES */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F5F5F7; /* Apple subtle gray */
            color: #1D1D1F; 
            overflow-x: hidden; 
        }
        
        /* SCROLLBAR HIDING */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* GLASSMORPHISM PANELS */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); 
            border-radius: 16px;
        }
        .glass-dark { 
            background: rgba(29, 29, 31, 0.75); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15); 
            border-radius: 16px;
        }
        .glass-yellow {
            background: rgba(250, 204, 21, 0.85); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 8px 24px rgba(250, 204, 21, 0.25);
            border-radius: 16px;
        }

        /* TACTILE ANIMATIONS */
        .taktil { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .taktil:active { transform: scale(0.95); opacity: 0.9; }
        .taktil-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }

        /* ANIMATIONS */
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-slide-up { animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pulse-soft { animation: pulseSoft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        @keyframes slideOutUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(0.95); display: none; } }
        .slide-out-up { animation: slideOutUp 0.5s cubic-bezier(0.85, 0, 0.15, 1) forwards; }

        /* SPINNER */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(250, 204, 21, 0.2);
            border-top-color: #FACC15;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#F5F5F7] flex flex-col items-center justify-center overflow-hidden transition-all duration-500">
        <div class="glass-panel p-8 flex flex-col items-center justify-center">
            <div class="spinner mb-6"></div>
            <img id="splash-logo" src="" class="w-32 h-auto mb-4 drop-shadow-sm rounded-[12px]">
            <h1 class="text-zinc-500 font-semibold text-xs tracking-[0.2em] uppercase text-center animate-pulse-soft">TA LOADING<br>SI'AT BEUH!</h1>
        </div>
    </div>

    <div id="success-screen" class="fixed inset-0 z-[100] bg-[#F5F5F7] hidden flex-col items-center justify-center p-6 overflow-hidden">
        <div class="glass-panel w-full max-w-sm p-8 relative z-10 flex flex-col items-center animate-slide-up text-center">
            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-green-500/30 text-white text-3xl">✓</div>
            <h1 class="text-[#1D1D1F] font-bold text-2xl tracking-tight mb-6">Struk Eksekusi</h1>
            
            <div class="w-full space-y-4 text-sm font-medium text-zinc-500 mb-8 bg-white/50 p-5 rounded-2xl border border-white/60">
                <div class="flex justify-between items-center pb-3 border-b border-zinc-200">
                    <span class="text-xs">Cabang</span><span id="receipt-branch" class="text-[#1D1D1F] font-semibold text-right">...</span>
                </div>
                <div class="flex justify-between items-center pb-3 border-b border-zinc-200">
                    <span class="text-xs">Capster</span><span id="receipt-capster" class="text-[#1D1D1F] font-semibold text-right">...</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs">Jadwal</span><span id="receipt-time" class="text-yellow-600 font-bold text-right text-base">...</span>
                </div>
            </div>
            
            <a href="#" id="receipt-maps" target="_blank" class="w-full block text-center glass-dark text-white py-4 font-semibold text-sm taktil mb-4">📍 Buka Rute Maps</a>
            <button onclick="location.reload()" class="text-xs font-semibold text-zinc-400 py-2 active:opacity-50 transition-opacity">Tutup & Kembali</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 glass-panel border-none rounded-none border-b border-white/40 px-6 py-4 flex justify-between items-center">
        <img id="nav-logo" src="" class="h-8 w-auto drop-shadow-sm rounded-[8px]" alt="Logo">
        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-900 bg-yellow-400 px-3 py-1.5 rounded-full shadow-sm animate-pulse-soft">Live Booking</div>
    </nav>

    <main id="app" class="max-w-md mx-auto px-5 mt-8 relative z-10">
        
        <section id="step-initial" class="animate-slide-up">
            <h1 class="font-extrabold text-4xl mb-2 tracking-tight text-[#1D1D1F]">WELCOME<br>SYEDARA LON</h1>
            <p class="text-sm font-medium text-zinc-500 mb-8">Kiban model ta koh ok uroenyo?</p>
            
            <div class="glass-dark text-white p-6 mb-8 text-center">
                <h2 id="hierarchy-title" class="font-bold text-sm text-yellow-400 uppercase tracking-widest mb-4">YELLOW BARBER CAPSTER</h2>
                <ul id="hierarchy-list" class="space-y-3 font-medium text-xs">
                    </ul>
            </div>

            <div id="branch-list" class="space-y-6 hidden"></div>
        </section>

        <section id="step-staff" class="hidden animate-slide-up">
            <button onclick="APP_LOGIC.resetToStep1()" class="text-xs font-semibold text-zinc-600 mb-6 flex items-center glass-panel px-4 py-3 taktil">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Balek ke menu
            </button>
            <h1 class="font-extrabold text-4xl mb-2 tracking-tight text-[#1D1D1F]">Pilih<br>Capster</h1>
            <div class="inline-flex items-center glass-yellow px-4 py-1.5 mb-8">
                <span class="w-2 h-2 rounded-full bg-zinc-900 mr-2 animate-pulse"></span>
                <p id="selected-branch-text" class="text-xs font-bold text-zinc-900 uppercase tracking-widest"></p>
            </div>
            
            <div id="staff-list" class="space-y-6"></div>
        </section>
    </main>

    <div id="bottom-bar" class="fixed bottom-6 left-5 right-5 z-40 hidden animate-slide-up">
        <div class="max-w-md mx-auto glass-dark p-5 flex justify-between items-center shadow-2xl">
            <div>
                <p class="text-[10px] uppercase text-zinc-400 font-semibold tracking-widest mb-1">Total Biaya</p>
                <p id="display-price" class="text-2xl font-bold text-white tracking-tight">Rp 0</p>
            </div>
            <button onclick="APP_LOGIC.openBookingForm()" class="bg-yellow-400 text-zinc-900 px-8 py-3.5 rounded-xl font-bold text-sm uppercase tracking-wider taktil shadow-lg shadow-yellow-400/20">Lanjut</button>
        </div>
    </div>

    <div id="modal-book" class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-md hidden flex items-end sm:items-center justify-center p-4 transition-opacity duration-300">
        <div class="glass-panel bg-white/80 w-full max-w-sm p-6 sm:p-8 animate-slide-up max-h-[90vh] overflow-y-auto hide-scrollbar">
            <div class="w-12 h-1.5 bg-zinc-300 rounded-full mx-auto mb-6"></div>
            <h2 class="font-bold text-2xl mb-1 text-center tracking-tight text-[#1D1D1F]">Finalisasi</h2>
            <p class="text-xs font-medium text-zinc-500 text-center mb-6">Pilih Jadwal & Data Diri</p>
            
            <div class="space-y-4">
                <div class="bg-white/60 p-4 rounded-[16px] border border-white/80 shadow-sm">
                    <p class="text-[10px] font-bold text-zinc-500 mb-3 uppercase tracking-widest">Pilih Tanggal</p>
                    <div id="date-slots" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1 pt-1 px-1"></div>
                    <input type="hidden" id="booking_date" value="">
                </div>
                <div class="bg-white/60 p-4 rounded-[16px] border border-white/80 shadow-sm">
                    <p class="text-[10px] font-bold text-zinc-500 mb-3 uppercase tracking-widest">Pilih Jam</p>
                    <div id="time-slots" class="grid grid-cols-3 gap-2"></div>
                    <input type="hidden" id="booking_time" value="">
                </div>
                
                <div class="pt-2">
                    <input type="text" id="cust_name" placeholder="Nama Lengkap" class="w-full bg-white/70 border border-white shadow-sm rounded-[16px] px-5 py-4 focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium text-zinc-900 placeholder-zinc-400 transition-all mb-3" autocomplete="off">
                    <input type="tel" id="cust_phone" placeholder="WhatsApp (08...)" class="w-full bg-white/70 border border-white shadow-sm rounded-[16px] px-5 py-4 focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium text-zinc-900 placeholder-zinc-400 transition-all" autocomplete="off">
                </div>
                
                <button id="btn-submit" onclick="APP_LOGIC.submitBooking()" class="w-full glass-yellow text-zinc-900 py-4 font-bold text-sm uppercase tracking-widest mt-4 taktil">Eksekusi Sekarang!</button>
                <button onclick="APP_LOGIC.closeModal()" class="w-full text-xs font-semibold text-zinc-500 py-3 taktil">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // ==============================================================
        // 🤖 AREA CONFIG
        // ==============================================================
        const CONFIG = {
            TENANT_ID: "YHB",
            BRAND_NAME: "YELLOW HAIRCUT",
            BRAND_INITIAL: "YELLOW",
            LOGO_URL: "https://raw.githubusercontent.com/sunsetdansenja-arch/YELLOW-BARBER-ASSETS/main/LOGO%20YELLOW%20BARBER.png",
            WEBHOOK_URL: 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/dbp-public',
            AVAILABLE_HOURS: ["10:00", "11:00", "12:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00"],
            
            HIERARCHY: [
                { label: "Head Barber", title: "MR" },
                { label: "Senior Barber", title: "SR" },
                { label: "Regular Barber", title: "JR" }
            ],

            BRANCHES_META: {
                "YELLOW BANDA": { 
                    img: "https://raw.githubusercontent.com/sunsetdansenja-arch/YELLOW-BARBER-ASSETS/main/PHOTO%20ASSETS%202.png", 
                    rating: "4.9", 
                    rev: "150+", 
                    tags: "<span>Free Wi-Fi</span><span>Full AC</span>", 
                    display_name: "BANDA ACEH" 
                }
            }
        };

        // ==============================================================
        // 🧠 CORE ENGINE
        // ==============================================================
        const extractData = (item) => item.json ? item.json : item;
        const delay = ms => new Promise(res => setTimeout(res, ms));

        const APP_LOGIC = {
            state: { branches: [], packages: [], staffs: [], selectedBranch: null, selectedStaff: null, selectedPackage: null, finalPrice: 0, selectedStaffName: null, selectedPackageName: null },

            async init() {
                document.getElementById('meta-title').innerText = `Booking | ${CONFIG.BRAND_NAME}`;
                document.getElementById('meta-icon').href = CONFIG.LOGO_URL;
                document.getElementById('splash-logo').src = CONFIG.LOGO_URL;
                document.getElementById('nav-logo').src = CONFIG.LOGO_URL;
                
                document.getElementById('hierarchy-list').innerHTML = CONFIG.HIERARCHY.map(h => 
                    `<li class="flex justify-between items-center border-b border-zinc-700/50 pb-2"><span class="text-zinc-300">${h.label}</span><span class="font-bold bg-zinc-800 text-white px-2 py-1 rounded-[6px] text-[10px] shadow-sm">${h.title}</span></li>`
                ).join('');

                try {
                    const fetchPromise = fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'get_initial_data', tenant_id: CONFIG.TENANT_ID })
                    }).then(res => res.json());

                    const [rawData] = await Promise.all([fetchPromise, delay(1500)]);
                    const payload = Array.isArray(rawData) ? rawData[0] : rawData;
                    
                    this.state.branches = payload.branches ? (Array.isArray(payload.branches) ? payload.branches.map(extractData) : [extractData(payload.branches)]) : [];
                    this.state.packages = payload.packages ? (Array.isArray(payload.packages) ? payload.packages.map(extractData) : [extractData(payload.packages)]) : [];
                    
                    document.getElementById('branch-list').classList.remove('hidden');
                    this.renderBranches();
                    
                    const splash = document.getElementById('splash-screen');
                    splash.classList.add('slide-out-up');
                    setTimeout(() => splash.remove(), 500);
                } catch (e) {
                    document.getElementById('splash-screen').innerHTML = `<div class="glass-dark p-6 text-center"><h1 class="text-white font-bold text-xl">GAGAL KONEKSI SERVER</h1></div>`;
                }
            },

            renderBranches() {
                const container = document.getElementById('branch-list');
                if (this.state.branches.length === 0) return;

                // Cek jam buka/tutup (Asumsi zona waktu lokal user)
                const currentHour = new Date().getHours();
                const isOpen = currentHour >= 10 && currentHour < 21;
                const statusBadge = isOpen 
                    ? `<div class="absolute top-4 left-4 bg-green-500/90 backdrop-blur-md text-white font-bold text-[10px] px-3 py-1.5 uppercase tracking-widest rounded-full shadow-sm z-20">🟢 BUKA</div>`
                    : `<div class="absolute top-4 left-4 bg-red-500/90 backdrop-blur-md text-white font-bold text-[10px] px-3 py-1.5 uppercase tracking-widest rounded-full shadow-sm z-20">🔴 TUTUP</div>`;

                container.innerHTML = this.state.branches.map((b, index) => {
                    const meta = CONFIG.BRANCHES_META[b.dpb_branches_name] || { img: CONFIG.LOGO_URL, rating: "5.0", rev: "New", tags: "<span>Premium</span>", display_name: b.dpb_branches_name };
                    const gmapsLink = b.gmaps || '#'; 

                    return `
                    <div onclick="APP_LOGIC.selectBranch('${b.dpb_branches_name}', '${meta.display_name}')" class="glass-panel group taktil-hover transition-all cursor-pointer block animate-slide-up overflow-hidden" style="animation-delay: ${index * 0.1}s">
                        <div class="relative w-full h-56 overflow-hidden">
                            <img src="${meta.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                            ${statusBadge}
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md text-zinc-900 font-bold text-xs px-2.5 py-1.5 shadow-sm flex items-center gap-1 rounded-full z-20">⭐️ ${meta.rating} <span class="text-[9px] text-zinc-500 uppercase ml-0.5">(${meta.rev})</span></div>
                            <a href="${gmapsLink}" target="_blank" onclick="event.stopPropagation()" class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-md border border-white/30 text-white font-bold text-[10px] px-4 py-2 shadow-sm flex items-center gap-2 rounded-full hover:bg-white hover:text-zinc-900 transition-colors z-20">🗺️ MAPS</a>
                        </div>
                        <div class="p-5 relative z-20">
                            <h3 class="font-extrabold text-2xl text-[#1D1D1F] tracking-tight mb-3">${meta.display_name}</h3>
                            <div class="flex flex-wrap gap-2 text-[10px] font-semibold uppercase tracking-wider text-zinc-600 [&>span]:bg-black/5 [&>span]:px-3 [&>span]:py-1 [&>span]:rounded-full [&>span]:border [&>span]:border-black/5">${meta.tags}</div>
                        </div>
                    </div>`;
                }).join('');
            },

            async selectBranch(dbName, displayName) {
                window.scrollTo({ top: 0, behavior: 'smooth' });

                this.state.selectedBranch = dbName;
                document.getElementById('step-initial').classList.add('hidden');
                document.getElementById('step-staff').classList.remove('hidden');
                document.getElementById('selected-branch-text').innerText = displayName;
                
                document.getElementById('staff-list').innerHTML = `<div class="glass-yellow p-8 text-center animate-pulse-soft"><h2 class="font-bold text-xl text-zinc-900 tracking-tight mb-2">Mengambil Data Capster...</h2><div class="spinner border-zinc-900 mx-auto w-8 h-8"></div></div>`;

                try {
                    const res = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'get_staff_list', branch_name: dbName, tenant_id: CONFIG.TENANT_ID })
                    });
                    
                    const rawStaff = await res.json();
                    this.state.staffs = (Array.isArray(rawStaff) ? rawStaff : [rawStaff]).map(extractData);
                    this.renderStaff(this.state.staffs);
                } catch (e) { console.error("Error Staff:", e); }
            },

            renderStaff(staffs) {
                const container = document.getElementById('staff-list');
                if (!staffs || staffs.length === 0 || !staffs[0].id) { container.innerHTML = `<p class="text-zinc-500 font-medium text-sm text-center py-4">Tidak ada capster tersedia saat ini.</p>`; return; }

                container.innerHTML = staffs.map((s, index) => {
                    // Logic Markup Harga Berdasarkan Hierarki
                    let priceMarkup = 0;
                    const role = s.role ? s.role.toUpperCase() : '';
                    if (role.includes('SR') || role.includes('SENIOR')) priceMarkup = 10000;
                    else if (role.includes('MR') || role.includes('HEAD') || role.includes('MASTER')) priceMarkup = 20000;

                    const servicesHtml = (s.services || []).map(ser => {
                        const finalPrice = Number(ser.price) + priceMarkup;
                        return `
                            <button onclick="APP_LOGIC.prepareBooking('${s.id}', '${ser.id}', ${finalPrice})" class="group flex justify-between items-center py-3.5 px-4 rounded-[12px] border border-zinc-200 bg-white/50 hover:bg-white hover:border-yellow-400 hover:shadow-md transition-all text-left taktil">
                                <span class="text-sm font-semibold text-zinc-700 group-hover:text-zinc-900">${ser.name}</span>
                                <span class="text-sm font-bold text-zinc-900">Rp ${finalPrice.toLocaleString('id-ID')}</span>
                            </button>
                        `;
                    }).join('');

                    return `
                    <div class="glass-panel p-5 relative animate-slide-up" style="animation-delay: ${index * 0.1}s">
                        ${s.is_top_performance ? '<div class="absolute -top-3 -right-2 glass-yellow text-zinc-900 text-[9px] font-bold px-3 py-1.5 rounded-full shadow-sm uppercase tracking-widest z-10">🔥 Top</div>' : ''}
                        <div class="flex items-center gap-4 mb-5">
                            <div class="w-20 h-20 shrink-0"><img src="${s.photo_url || CONFIG.LOGO_URL}" class="w-full h-full rounded-full object-cover border-2 border-white shadow-sm"></div>
                            <div>
                                <h4 class="font-bold text-xl text-[#1D1D1F] tracking-tight leading-none mb-1.5">${s.dbp_staff_name}</h4>
                                <span class="text-[10px] font-bold text-zinc-600 bg-zinc-200/50 px-2 py-1 rounded-md border border-zinc-300/50">${s.role}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 gap-2.5">
                            ${servicesHtml}
                        </div>
                    </div>`;
                }).join('');
            },

            prepareBooking(staffId, packageId, price) {
                this.state.selectedStaff = staffId; this.state.selectedPackage = packageId; this.state.finalPrice = price;
                const staff = this.state.staffs.find(s => s.id == staffId);
                const service = staff ? staff.services.find(sr => sr.id == packageId) : null;
                this.state.selectedStaffName = staff ? staff.dbp_staff_name : staffId;
                this.state.selectedPackageName = service ? service.name : packageId;
                document.getElementById('display-price').innerText = `Rp ${price.toLocaleString('id-ID')}`;
                document.getElementById('bottom-bar').classList.remove('hidden');
            },

            generateDates() {
                const dates = []; const today = new Date(); const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"]; const dayNames = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
                for(let i=0; i<8; i++) {
                    const d = new Date(today); d.setDate(d.getDate() + i);
                    const day = d.getDate().toString().padStart(2, '0'); const month = monthNames[d.getMonth()]; const dayName = dayNames[d.getDay()]; const year = d.getFullYear();
                    dates.push({ display: i === 0 ? "Hari Ini" : `${dayName}, ${day} ${month}`, value: `${year}-${(d.getMonth()+1).toString().padStart(2,'0')}-${day}` });
                } return dates;
            },

            openBookingForm() { document.getElementById('booking_date').value = ''; document.getElementById('booking_time').value = ''; this.renderDateSlots(); this.renderTimeSlots(); document.getElementById('modal-book').classList.remove('hidden'); },
            closeModal() { document.getElementById('modal-book').classList.add('hidden'); },

            renderDateSlots() {
                document.getElementById('date-slots').innerHTML = this.generateDates().map(d => `<button id="btn-date-${d.value}" onclick="APP_LOGIC.selectDate('${d.value}')" class="date-btn flex-shrink-0 bg-white text-zinc-600 border border-zinc-200 px-4 py-2.5 rounded-[12px] text-xs font-semibold hover:border-yellow-400 transition-all taktil whitespace-nowrap shadow-sm">${d.display}</button>`).join('');
            },

            selectDate(dateValue) {
                document.getElementById('booking_date').value = dateValue;
                document.querySelectorAll('.date-btn').forEach(btn => { btn.classList.remove('bg-yellow-400', 'text-zinc-900', 'border-yellow-400'); btn.classList.add('bg-white', 'text-zinc-600', 'border-zinc-200'); });
                const selectedBtn = document.getElementById(`btn-date-${dateValue}`); selectedBtn.classList.remove('bg-white', 'text-zinc-600', 'border-zinc-200'); selectedBtn.classList.add('bg-yellow-400', 'text-zinc-900', 'border-yellow-400');
                document.getElementById('booking_time').value = ''; this.renderTimeSlots();
            },

            renderTimeSlots() {
                const container = document.getElementById('time-slots'); const selectedDate = document.getElementById('booking_date').value;
                if (!selectedDate) { container.innerHTML = `<div class="col-span-3 text-center py-4 text-xs font-medium text-zinc-400 border border-dashed border-zinc-300 rounded-[12px]">Pilih Tanggal Dulu</div>`; return; }

                const selectedStaffData = this.state.staffs.find(s => s.id == this.state.selectedStaff);
                const bookedSlots = selectedStaffData ? (selectedStaffData.booked_slots || []) : [];

                container.innerHTML = CONFIG.AVAILABLE_HOURS.map(h => {
                    const isBooked = bookedSlots.some(slot => String(slot).includes(selectedDate) && String(slot).includes(h));
                    if (isBooked) return `<div class="relative w-full"><button disabled class="w-full bg-zinc-100 border border-zinc-200 text-zinc-400 py-2.5 rounded-[12px] text-xs font-semibold opacity-60 cursor-not-allowed">${h}</button><div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="bg-zinc-800 text-white font-bold text-[8px] px-2 py-0.5 rounded-sm uppercase tracking-widest shadow-sm">BOOKED</span></div></div>`;
                    return `<button id="btn-time-${h.replace(':','')}" onclick="APP_LOGIC.selectTime('${h}')" class="time-btn w-full bg-white text-zinc-600 border border-zinc-200 py-2.5 rounded-[12px] text-xs font-semibold hover:border-yellow-400 transition-all taktil shadow-sm">${h}</button>`;
                }).join('');
            },

            selectTime(hour) {
                document.getElementById('booking_time').value = hour;
                document.querySelectorAll('.time-btn').forEach(btn => { btn.classList.remove('bg-yellow-400', 'text-zinc-900', 'border-yellow-400'); btn.classList.add('bg-white', 'text-zinc-600', 'border-zinc-200'); });
                const selectedBtn = document.getElementById(`btn-time-${hour.replace(':','')}`); selectedBtn.classList.remove('bg-white', 'text-zinc-600', 'border-zinc-200'); selectedBtn.classList.add('bg-yellow-400', 'text-zinc-900', 'border-yellow-400');
            },

            async submitBooking() {
                const name = document.getElementById('cust_name').value.trim(); const phone = document.getElementById('cust_phone').value.trim(); const tanggal = document.getElementById('booking_date').value; const jam = document.getElementById('booking_time').value;
                if(!name || !phone || !tanggal || !jam) return alert('Lengkapi Jadwal dan Data Diri dulu ya.');

                const btn = document.getElementById('btn-submit'); btn.innerText = "MEMPROSES..."; btn.disabled = true; btn.classList.add('opacity-70');

                try {
                    const res = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            action: 'submit_booking', cust_name: name, cust_phone: phone, tanggal: tanggal, jam: jam,
                            branch_id: this.state.selectedBranch, capster_id: this.state.selectedStaff, package_id: this.state.selectedPackage, 
                            price: this.state.finalPrice, caps_in_charge: this.state.selectedStaffName, package_name: this.state.selectedPackageName,
                            tenant_id: CONFIG.TENANT_ID
                        })
                    });
                    
                    if(res.ok) {
                        const branchMeta = CONFIG.BRANCHES_META[this.state.selectedBranch] || { display_name: this.state.selectedBranch };
                        document.getElementById('receipt-branch').innerText = branchMeta.display_name;
                        
                        const selectedStaffData = this.state.staffs.find(s => s.id == this.state.selectedStaff);
                        document.getElementById('receipt-capster').innerText = selectedStaffData ? selectedStaffData.dbp_staff_name : 'Capster';
                        document.getElementById('receipt-time').innerText = `${tanggal} | ${jam}`;
                        
                        document.getElementById('modal-book').classList.add('hidden');
                        const successScreen = document.getElementById('success-screen');
                        successScreen.classList.remove('hidden'); successScreen.classList.add('flex', 'animate-slide-up');
                    } else { throw new Error("Server error"); }
                } catch (e) { alert('Gagal kirim data booking. Coba lagi.'); btn.innerText = "EKSEKUSI SEKARANG!"; btn.disabled = false; btn.classList.remove('opacity-70'); }
            },

            resetToStep1() { window.scrollTo({ top: 0, behavior: 'smooth' }); document.getElementById('step-initial').classList.remove('hidden'); document.getElementById('step-staff').classList.add('hidden'); document.getElementById('bottom-bar').classList.add('hidden'); }
        };

        window.onload = () => APP_LOGIC.init();
    </script>
</body>
</html>
